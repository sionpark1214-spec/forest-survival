<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0b1a0e" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<title>숲에 생존</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0b1a0e;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Malgun Gothic", sans-serif;
    color: #eaf6ea; touch-action: none; }
  #c { position: fixed; inset: 0; display: block; }

  /* ===== 타이틀 ===== */
  #title { position: fixed; inset: 0; z-index: 50; display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 24px; background: radial-gradient(ellipse at 50% 30%, #143a1c 0%, #0b1a0e 70%); }
  #title .deco { font-size: 40px; margin-bottom: 8px; }
  #title h1 { font-size: 15vw; font-weight: 900; letter-spacing: 2px; line-height: 1.1;
    background: linear-gradient(180deg, #d7f5b8, #5fbf6a 55%, #2f8a3a);
    -webkit-background-clip: text; background-clip: text; color: transparent; text-shadow: 0 0 50px rgba(80,200,100,0.35); }
  @media (min-width:520px){ #title h1{ font-size:74px; } }
  #title .sub { margin-top: 8px; font-size: 14px; color: #a9d8b0; letter-spacing: 3px; }
  #title .hint { margin-top: 14px; font-size: 13px; color: #88b692; line-height:1.6; max-width:320px;}
  .btn { margin-top: 22px; padding: 16px 56px; font-size: 22px; font-weight: 900; border: none; border-radius: 16px;
    color: #07210e; background: linear-gradient(180deg, #aef0b2, #4fbf6a); box-shadow: 0 10px 30px rgba(60,180,90,0.4); cursor: pointer; }
  .btn:active { transform: translateY(2px); }

  /* ===== HUD ===== */
  #hud { position: fixed; top: 0; left: 0; right: 0; z-index: 10; padding: 8px 10px; pointer-events: none; }
  .bars { display: flex; flex-direction: column; gap: 4px; width: 190px; }
  .bar { position: relative; height: 15px; background: rgba(0,0,0,0.45); border-radius: 8px; overflow: hidden; border:1px solid rgba(255,255,255,0.12);}
  .bar > i { position: absolute; left: 0; top: 0; bottom: 0; border-radius: 8px; transition: width .15s linear; }
  .bar > span { position: absolute; left: 7px; top: 0; bottom: 0; display:flex; align-items:center; font-size: 10px; font-weight: 800; text-shadow: 0 1px 2px #000; }
  #topright { position: fixed; top: 8px; right: 8px; z-index: 10; text-align: right; }
  #dayInfo { font-size: 13px; font-weight: 800; text-shadow: 0 1px 3px #000; background: rgba(0,0,0,0.35); padding: 4px 9px; border-radius: 9px; display:inline-block;}
  #mapWrap { margin-top: 6px; }
  #map { background: rgba(8,20,10,0.6); border: 2px solid rgba(120,200,130,0.4); border-radius: 8px; display:block; }

  /* ===== 조이스틱 ===== */
  #joy { position: fixed; left: 18px; bottom: 24px; width: 130px; height: 130px; z-index: 12;
    border-radius: 50%; background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.18); }
  #joyKnob { position: absolute; left: 35px; top: 35px; width: 60px; height: 60px; border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, #d7f5b8, #4fbf6a); box-shadow: 0 4px 14px rgba(0,0,0,0.4); }

  /* ===== 액션 버튼 ===== */
  #acts { position: fixed; right: 14px; bottom: 18px; z-index: 12; display: grid; grid-template-columns: 70px 70px; gap: 10px; }
  .ab { width: 70px; height: 70px; border-radius: 50%; border: none; font-size: 12px; font-weight: 900; color: #fff;
    display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 5px 16px rgba(0,0,0,0.45); cursor: pointer; line-height:1.2;}
  .ab .ic { font-size: 24px; }
  .ab:active { transform: scale(0.92); }
  #bAttack { background: linear-gradient(180deg, #ff7a7a, #d63a3a); }
  #bAct { background: linear-gradient(180deg, #7adf86, #2f9e45); }
  #bCraft { background: linear-gradient(180deg, #7ab8ff, #2f6fd6); }
  #bBag { background: linear-gradient(180deg, #ffcf6a, #e09a1f); color:#3a2600;}
  #actLabel { position: fixed; right: 14px; bottom: 168px; z-index: 12; font-size: 13px; font-weight: 800;
    background: rgba(0,0,0,0.5); padding: 5px 12px; border-radius: 10px; text-shadow:0 1px 2px #000; max-width:170px; text-align:center; }

  /* ===== 메시지 ===== */
  #msg { position: fixed; left: 50%; top: 16%; transform: translateX(-50%); z-index: 15; font-size: 15px; font-weight: 800;
    background: rgba(0,0,0,0.55); padding: 8px 16px; border-radius: 12px; text-shadow: 0 1px 3px #000; opacity: 0; transition: opacity .2s; pointer-events:none; max-width:80%; text-align:center;}
  #bigMsg { position: fixed; left: 50%; top: 38%; transform: translateX(-50%); z-index: 15; font-size: 30px; font-weight: 900;
    text-shadow: 0 2px 10px #000; opacity: 0; transition: opacity .3s; pointer-events:none; text-align:center; width:90%;}

  /* ===== 패널 (제작/가방) ===== */
  .panel { position: fixed; inset: 0; z-index: 30; background: rgba(4,12,6,0.86); display: none; flex-direction: column; padding: 18px; overflow-y: auto; }
  .panel.show { display: flex; }
  .panel h2 { font-size: 22px; font-weight: 900; margin-bottom: 4px; }
  .panel .close { position: absolute; top: 14px; right: 16px; font-size: 26px; background: none; border: none; color: #fff; cursor: pointer; }
  .row { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 11px 13px; margin-top: 9px; }
  .row .ti { font-size: 28px; }
  .row .tx { flex: 1; }
  .row .tx b { font-size: 16px; }
  .row .tx small { display:block; color: #a9d8b0; font-size: 12px; margin-top:2px;}
  .row button { padding: 9px 16px; border: none; border-radius: 10px; font-weight: 900; font-size: 14px; cursor: pointer;
    background: linear-gradient(180deg, #aef0b2, #4fbf6a); color: #07210e; }
  .row button:disabled { background: #3a4a3d; color: #889; }
  .seclabel { margin-top:16px; font-size:13px; font-weight:900; color:#9fd8a8; letter-spacing:1px;}

  /* ===== 데미지/효과 오버레이 ===== */
  #vig { position: fixed; inset: 0; z-index: 8; pointer-events: none; box-shadow: inset 0 0 0 0 rgba(255,0,0,0); transition: box-shadow .2s; }
  #poisonVig { position: fixed; inset: 0; z-index: 8; pointer-events: none; transition: background .3s;}
  #fade { position: fixed; inset: 0; z-index: 40; background: #000; opacity: 0; pointer-events: none; transition: opacity .5s; }

  /* ===== 헬기 전투 / 시네마틱 ===== */
  #heli { position: fixed; inset: 0; z-index: 45; display: none; flex-direction: column; align-items: center;
    background: linear-gradient(180deg, #2a2622 0%, #15120f 100%); overflow: hidden; }
  #heli.show { display: flex; }
  #heliTop { width: 100%; padding: 14px; display: flex; justify-content: space-between; align-items: center; z-index: 2;}
  #heliTimer { font-size: 26px; font-weight: 900; color: #ff5a5a; text-shadow: 0 2px 6px #000; }
  #heliMyHp { font-size: 15px; font-weight: 800; }
  #heliInfo { font-size: 14px; font-weight: 800; color: #ffd36a; text-align:center; margin-top:4px; min-height:20px; z-index:2; padding:0 14px;}
  #enemies { flex: 1; width: 100%; display: flex; align-items: center; justify-content: center; gap: 4vw; z-index: 1; }
  .enemy { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: transform .1s; }
  .enemy:active { transform: scale(0.93); }
  .enemy .face { font-size: 64px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.6)); transition: transform .2s, filter .2s; }
  .enemy.dead .face { transform: rotate(90deg) translateY(10px); filter: grayscale(1) brightness(0.6); }
  .enemy .ehp { width: 64px; height: 9px; background: #422; border-radius: 5px; margin-top: 8px; overflow: hidden; border:1px solid #633;}
  .enemy .ehp > i { display: block; height: 100%; background: linear-gradient(90deg,#ff7a7a,#ff3a3a); border-radius:5px; transition: width .15s; }
  .enemy .tag { font-size: 11px; margin-top: 4px; font-weight: 800; color: #ffd36a; min-height:14px;}
  #heliBtns { width: 100%; padding: 16px; display: flex; gap: 12px; justify-content: center; z-index: 2;}
  #heliBtns button { flex:1; max-width:170px; padding: 16px; border: none; border-radius: 14px; font-size: 17px; font-weight: 900; cursor: pointer; }
  #hAttack { background: linear-gradient(180deg, #ff7a7a, #d63a3a); color: #fff; }
  #hPilot { background: linear-gradient(180deg, #ffd36a, #e0a020); color: #3a2600; display:none; }
  #flashWhite { position: fixed; inset: 0; z-index: 47; background: #fff; opacity: 0; pointer-events: none; transition: opacity .1s; }

  #cine { position: fixed; inset: 0; z-index: 48; display: none; flex-direction: column; align-items: center; justify-content: center;
    background: #000; text-align: center; padding: 24px; }
  #cine.show { display: flex; }
  #cineEmo { font-size: 90px; animation: cinePulse 1s infinite; }
  @keyframes cinePulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.12);} }
  #cineText { font-size: 26px; font-weight: 900; margin-top: 18px; line-height:1.5;}
  #cineSub { font-size: 15px; color: #b8c8bb; margin-top: 12px; min-height:22px;}
  #cineBtn { margin-top: 28px; display:none; }

  .hidden { display: none !important; }

  /* 멀티 로비 */
  #mpBox { margin-top:16px; width:100%; max-width:320px; display:flex; flex-direction:column; align-items:center; gap:10px; }
  #mpBox input { width:100%; padding:12px 14px; border-radius:12px; border:2px solid rgba(120,200,140,0.4); background:rgba(255,255,255,0.1); color:#eaf6ea; font-size:16px; font-weight:700; text-align:center; }
  #mpBox input::placeholder { color:#7fa388; }
  .mpRow { display:flex; gap:8px; width:100%; }
  .btn.mpb { margin-top:0; padding:12px 18px; font-size:16px; flex-shrink:0; }
  #codeInput { text-transform:uppercase; letter-spacing:3px; }
  #mpStatus { font-size:14px; font-weight:800; color:#ffd36a; min-height:20px; text-align:center; }
  #mpPlayers { font-size:14px; color:#aef0b2; font-weight:700; text-align:center; line-height:1.6; }
  #mpCode { font-size:30px; font-weight:900; letter-spacing:6px; color:#aef0b2; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<!-- 타이틀 -->
<div id="title">
  <div class="deco">🌲🏕️🌲</div>
  <h1>숲에 생존</h1>
  <div class="sub">FOREST SURVIVAL</div>
  <div class="hint">비행기가 추락했다… 숲에서 살아남아라. 🌲<br>버티다 보면 구조 헬기가 올 거야. 집으로 돌아가자!</div>
  <button class="btn" id="startBtn">혼자 하기</button>
  <button class="btn" id="mpBtn" style="background:linear-gradient(180deg,#9ad0ff,#3f8fe0);margin-top:12px;">같이 하기 (최대 4명)</button>
  <div id="mpBox" class="hidden">
    <input id="nameInput" placeholder="내 이름 (예: 시온)" maxlength="8" />
    <div class="mpRow">
      <button class="btn mpb" id="hostBtn">방 만들기</button>
    </div>
    <div class="mpRow">
      <input id="codeInput" placeholder="방 코드 4글자" maxlength="4" />
      <button class="btn mpb" id="joinBtn">참가</button>
    </div>
    <div id="mpStatus"></div>
    <div id="mpPlayers"></div>
    <button class="btn" id="mpStartBtn" style="display:none;">게임 시작!</button>
  </div>
</div>

<!-- HUD -->
<div id="hud" class="hidden">
  <div class="bars">
    <div class="bar"><i id="barHp" style="background:linear-gradient(90deg,#ff8a8a,#e23a3a)"></i><span>❤️ 체력</span></div>
    <div class="bar"><i id="barHun" style="background:linear-gradient(90deg,#ffd07a,#e08a1f)"></i><span>🍖 배고픔</span></div>
    <div class="bar"><i id="barThi" style="background:linear-gradient(90deg,#7ad0ff,#2f8fd6)"></i><span>💧 목마름</span></div>
    <div class="bar"><i id="barTem" style="background:linear-gradient(90deg,#ffb0e0,#d65aa0)"></i><span>❄️ 체온</span></div>
    <div class="bar"><i id="barSta" style="background:linear-gradient(90deg,#b0ff8a,#4fbf2f)"></i><span>💪 힘</span></div>
  </div>
</div>
<div id="topright" class="hidden">
  <div id="dayInfo">1일째 ☀️ 낮</div>
  <div id="mapWrap"><canvas id="map" width="96" height="96"></canvas></div>
</div>

<!-- 조이스틱 / 버튼 -->
<div id="joy" class="hidden"><div id="joyKnob"></div></div>
<div id="actLabel" class="hidden"></div>
<div id="acts" class="hidden">
  <button class="ab" id="bAttack"><span class="ic">⚔️</span>공격</button>
  <button class="ab" id="bAct"><span class="ic">✋</span><span id="bActTxt">행동</span></button>
  <button class="ab" id="bCraft"><span class="ic">🛠️</span>제작</button>
  <button class="ab" id="bBag"><span class="ic">🎒</span>가방</button>
</div>

<div id="msg"></div>
<div id="bigMsg"></div>
<div id="vig"></div>
<div id="poisonVig"></div>
<div id="fade"></div>

<!-- 제작 패널 -->
<div class="panel" id="craftPanel">
  <h2>🛠️ 제작</h2>
  <button class="close" data-close="craftPanel">✕</button>
  <div id="craftList"></div>
</div>

<!-- 가방 패널 -->
<div class="panel" id="bagPanel">
  <h2>🎒 가방</h2>
  <button class="close" data-close="bagPanel">✕</button>
  <div id="bagList"></div>
</div>

<!-- 헬기 전투 -->
<div id="heli">
  <div id="heliTop">
    <div id="heliMyHp">❤️ 100</div>
    <div id="heliTimer">40</div>
  </div>
  <div id="heliInfo"></div>
  <div id="enemies"></div>
  <div id="heliBtns">
    <button id="hAttack">⚔️ 공격</button>
    <button id="hPilot">🚁 조종해서 탈출</button>
  </div>
</div>
<div id="flashWhite"></div>

<!-- 시네마틱 -->
<div id="cine">
  <div id="cineEmo">💀</div>
  <div id="cineText"></div>
  <div id="cineSub"></div>
  <button class="btn" id="cineBtn">타이틀로</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
"use strict";
/* =========================================================
   숲에 생존 — 3D 서바이벌 (단일 파일)
   ========================================================= */
const THREE_OK = (typeof THREE !== "undefined");

// ---------- 게임 상태 ----------
const S = {
  hp:100, hunger:100, thirst:100, temp:100, stamina:100,
  poison:0,
  day:1, phase:"day",
  phaseTime:180,
  nightLen:120,
  weather:"clear", weatherT:40,
  mat:{ wood:0, stone:0, vine:0, arrow:0 },
  food:{ cookedmeat:0, rawmeat:0, cookedfish:0, rawfish:0, herb:0, berry:0 },
  maxSlots:5,
  weapon:"hand",
  has:{ spear:false, axe:false, bow:false },
  dur:{ spear:0, axe:0, bow:0 },
  bowCharge:0,
  stunTime:0, electro:0,
  house:null, bedPos:null, houseRate:0, houseTempProt:0,
  sleeping:false,
  alive:true, mode:"title",
  near:null,
  heliActive:false, heliObj:null, heliTimer:0, heliPos:null, _heliSpawnedDay:null,
  heliRound:0, cineAction:null,
};

const FOOD_KEYS = ["cookedmeat","rawmeat","cookedfish","rawfish","herb","berry"];
function foodCount(){ let n=0; for(const k of FOOD_KEYS) n+=S.food[k]; return n; }
function addFood(k,n){
  n=n||1;
  if(foodCount()+n > S.maxSlots){ toast("가방이 꽉 찼어! 🎒"); return false; }
  S.food[k]+=n; return true;
}

// ---------- 효과음 (Web Audio, 파일 없이 생성) ----------
const SFX=(function(){
  let ac=null, master=null;
  function ctx(){ if(!ac){ try{ ac=new (window.AudioContext||window.webkitAudioContext)(); master=ac.createGain(); master.gain.value=0.45; master.connect(ac.destination); }catch(e){ return null; } } return ac; }
  function now(){ return ac.currentTime; }
  function noiseBuf(dur){ const a=ctx(); const n=Math.max(1,Math.floor(a.sampleRate*dur)); const b=a.createBuffer(1,n,a.sampleRate); const d=b.getChannelData(0); for(let i=0;i<n;i++) d[i]=Math.random()*2-1; return b; }
  function resume(){ const a=ctx(); if(a && a.state==="suspended") a.resume(); }
  // 터벅터벅 (걸음)
  function step(){ const a=ctx(); if(!a)return; const o=a.createOscillator(),g=a.createGain(); o.type="sine"; o.frequency.setValueAtTime(115,now()); o.frequency.exponentialRampToValueAtTime(52,now()+0.09); g.gain.setValueAtTime(0.0001,now()); g.gain.exponentialRampToValueAtTime(0.3,now()+0.01); g.gain.exponentialRampToValueAtTime(0.0001,now()+0.13); o.connect(g).connect(master); o.start(); o.stop(now()+0.14); }
  // 샤삭 (무기 휘두름)
  function swing(){ const a=ctx(); if(!a)return; const src=a.createBufferSource(); src.buffer=noiseBuf(0.22); const bp=a.createBiquadFilter(); bp.type="bandpass"; bp.frequency.setValueAtTime(700,now()); bp.frequency.exponentialRampToValueAtTime(3200,now()+0.15); bp.Q.value=1.1; const g=a.createGain(); g.gain.setValueAtTime(0.0001,now()); g.gain.exponentialRampToValueAtTime(0.28,now()+0.02); g.gain.exponentialRampToValueAtTime(0.0001,now()+0.2); src.connect(bp).connect(g).connect(master); src.start(); src.stop(now()+0.22); }
  // 하악! (맹수 물기)
  function bite(){ const a=ctx(); if(!a)return; const o=a.createOscillator(); o.type="sawtooth"; o.frequency.setValueAtTime(190,now()); o.frequency.exponentialRampToValueAtTime(65,now()+0.26); const lp=a.createBiquadFilter(); lp.type="lowpass"; lp.frequency.value=1300; const g=a.createGain(); g.gain.setValueAtTime(0.0001,now()); g.gain.exponentialRampToValueAtTime(0.4,now()+0.03); g.gain.exponentialRampToValueAtTime(0.0001,now()+0.3); o.connect(lp).connect(g).connect(master); o.start(); o.stop(now()+0.32); const src=a.createBufferSource(); src.buffer=noiseBuf(0.3); const bp=a.createBiquadFilter(); bp.type="bandpass"; bp.frequency.value=420; const g2=a.createGain(); g2.gain.setValueAtTime(0.22,now()); g2.gain.exponentialRampToValueAtTime(0.0001,now()+0.3); src.connect(bp).connect(g2).connect(master); src.start(); src.stop(now()+0.3); }
  // 찌리릿 (전기)
  function zap(){ const a=ctx(); if(!a)return; const o=a.createOscillator(); o.type="square"; o.frequency.setValueAtTime(1300,now()); const lfo=a.createOscillator(); lfo.type="square"; lfo.frequency.value=55; const lg=a.createGain(); lg.gain.value=450; lfo.connect(lg).connect(o.frequency); const g=a.createGain(); g.gain.setValueAtTime(0.0001,now()); g.gain.exponentialRampToValueAtTime(0.25,now()+0.02); g.gain.exponentialRampToValueAtTime(0.0001,now()+0.4); o.connect(g).connect(master); o.start(); lfo.start(); o.stop(now()+0.42); lfo.stop(now()+0.42); const src=a.createBufferSource(); src.buffer=noiseBuf(0.4); const hp=a.createBiquadFilter(); hp.type="highpass"; hp.frequency.value=2200; const g2=a.createGain(); g2.gain.setValueAtTime(0.16,now()); g2.gain.exponentialRampToValueAtTime(0.0001,now()+0.4); src.connect(hp).connect(g2).connect(master); src.start(); src.stop(now()+0.4); }
  // 쿵 (드래곤 강하/착지)
  function boom(){ const a=ctx(); if(!a)return; const o=a.createOscillator(); o.type="sine"; o.frequency.setValueAtTime(130,now()); o.frequency.exponentialRampToValueAtTime(32,now()+0.5); const g=a.createGain(); g.gain.setValueAtTime(0.0001,now()); g.gain.exponentialRampToValueAtTime(0.6,now()+0.02); g.gain.exponentialRampToValueAtTime(0.0001,now()+0.7); o.connect(g).connect(master); o.start(); o.stop(now()+0.72); const src=a.createBufferSource(); src.buffer=noiseBuf(0.3); const lp=a.createBiquadFilter(); lp.type="lowpass"; lp.frequency.value=320; const g2=a.createGain(); g2.gain.setValueAtTime(0.4,now()); g2.gain.exponentialRampToValueAtTime(0.0001,now()+0.3); src.connect(lp).connect(g2).connect(master); src.start(); src.stop(now()+0.3); }
  return {resume, step, swing, bite, zap, boom};
})();

// ---------- Three.js ----------
const canvas = document.getElementById("c");
let renderer, scene, camera, sun, hemi, ambient;
let player, playerYaw=0, playerWalk=0;
const trees=[], rocks=[], bushes=[], herbs=[], animals=[], fishes=[], bugs=[], drops=[], campfires=[], spikes=[], walls=[];
let houseMesh=null;
const springPos=new THREE.Vector3(20,0,-22);
const rivers=[];
const waterMeshes=[];
const MAP=700;

function initThree(){
  renderer = new THREE.WebGLRenderer({canvas, antialias:true, powerPreference:"high-performance"});
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x9fd9ff);
  scene.fog = new THREE.Fog(0x9fd9ff, 70, 260);

  camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);

  hemi = new THREE.HemisphereLight(0xcfeaff, 0x335522, 0.7); scene.add(hemi);
  ambient = new THREE.AmbientLight(0xffffff, 0.25); scene.add(ambient);
  sun = new THREE.DirectionalLight(0xfff2d0, 1.1);
  sun.position.set(30,60,20); sun.castShadow = true;
  sun.shadow.mapSize.set(2048,2048);
  const sc = sun.shadow.camera; sc.near=1; sc.far=200; sc.left=-70; sc.right=70; sc.top=70; sc.bottom=-70;
  scene.add(sun); scene.add(sun.target);

  _useSeed=true; buildWorld(); _useSeed=false;
  buildPlayer();
  spawnAnimals();
  addEventListener("resize", onResize);
}
function onResize(){
  if(!renderer) return;
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
}

// ---------- 월드 ----------
// 시드 랜덤: 월드 생성 때만 켜서 모든 플레이어가 같은 숲을 보게
let _useSeed=false, _seed=1;
function setSeed(s){ _seed=(s>>>0)||1; }
function rand(){ if(_useSeed){ _seed=(_seed*1664525+1013904223)>>>0; return _seed/4294967296; } return Math.random(); }
function rnd(a,b){ return a + rand()*(b-a); }
function inRiver(x,z){ for(const r of rivers){ if(x>r.minX&&x<r.maxX&&z>r.minZ&&z<r.maxZ) return true; } return false; }
function buildWorld(){
  const ground = new THREE.Mesh(new THREE.PlaneGeometry(MAP*2+40, MAP*2+40),
    new THREE.MeshLambertMaterial({color:0x3f8f3a}));
  ground.rotation.x=-Math.PI/2; ground.receiveShadow=true; scene.add(ground);
  const patch = new THREE.MeshLambertMaterial({color:0x357d31});
  for(let i=0;i<40;i++){
    const p = new THREE.Mesh(new THREE.CircleGeometry(rnd(3,7),8), patch);
    p.rotation.x=-Math.PI/2; p.position.set(rnd(-MAP,MAP),0.01,rnd(-MAP,MAP)); scene.add(p);
  }
  const riverDefs=[
    {minX:-MAP,maxX:MAP, minZ:-14,maxZ:-6},
    {minX:6,maxX:14, minZ:-MAP,maxZ:MAP},
    {minX:-MAP,maxX:MAP, minZ:26,maxZ:34},
  ];
  const bankMat=new THREE.MeshLambertMaterial({color:0xc2a878});
  for(const r of riverDefs){
    rivers.push(r);
    const cx=(r.minX+r.maxX)/2, cz=(r.minZ+r.maxZ)/2;
    // 모래 둑
    const bank=new THREE.Mesh(new THREE.PlaneGeometry(r.maxX-r.minX+3, r.maxZ-r.minZ+3), bankMat);
    bank.rotation.x=-Math.PI/2; bank.position.set(cx,0.02,cz); bank.receiveShadow=true; scene.add(bank);
    // 물 (물결 애니메이션용 개별 머티리얼)
    const m=new THREE.Mesh(new THREE.PlaneGeometry(r.maxX-r.minX, r.maxZ-r.minZ),
      new THREE.MeshLambertMaterial({color:0x2f7fd6, transparent:true, opacity:0.82}));
    m.rotation.x=-Math.PI/2; m.position.set(cx,0.06,cz); scene.add(m); waterMeshes.push(m);
    // 물가 돌멩이
    for(let i=0;i<5;i++){ const st=new THREE.Mesh(new THREE.DodecahedronGeometry(rnd(0.2,0.4),0), new THREE.MeshLambertMaterial({color:0x9a9a92})); st.position.set(rnd(r.minX,r.maxX),0.1,(rand()<0.5?r.minZ-0.5:r.maxZ+0.5)); scene.add(st); }
  }
  const spring = new THREE.Mesh(new THREE.CircleGeometry(3.2,24), new THREE.MeshLambertMaterial({color:0x6fd0ff,transparent:true,opacity:0.9}));
  spring.rotation.x=-Math.PI/2; spring.position.copy(springPos); spring.position.y=0.05; scene.add(spring);
  const ring=new THREE.Mesh(new THREE.RingGeometry(3.2,3.8,24), new THREE.MeshLambertMaterial({color:0xdfeee0}));
  ring.rotation.x=-Math.PI/2; ring.position.copy(springPos); ring.position.y=0.05; scene.add(ring);

  for(let i=0;i<800;i++){
    let x,z,tries=0;
    do{ x=rnd(-MAP,MAP); z=rnd(-MAP,MAP); tries++; }while((inRiver(x,z)||Math.hypot(x,z)<6||x*x+z*z>MAP*MAP)&&tries<10);
    if(tries>=10) continue;
    trees.push(makeTree(x,z));
  }
  for(let i=0;i<400;i++){ let x=rnd(-MAP,MAP),z=rnd(-MAP,MAP); if(inRiver(x,z)||Math.hypot(x,z)<5) continue; rocks.push(makeRock(x,z)); }
  for(let i=0;i<160;i++){ let x=rnd(-MAP,MAP),z=rnd(-MAP,MAP); if(inRiver(x,z)||Math.hypot(x,z)<5) continue; bushes.push(makeBush(x,z)); }
  for(let i=0;i<100;i++){ let x=rnd(-MAP,MAP),z=rnd(-MAP,MAP); if(inRiver(x,z)||Math.hypot(x,z)<5) continue; herbs.push(makeHerb(x,z)); }
  const pm=playerMult();
  for(const r of rivers){ for(let i=0;i<4*pm;i++) fishes.push(makeFish(r)); }
  for(let i=0;i<100*pm;i++) bugs.push(makeBug());
  // 풀잎 (바닥 디테일)
  const grassMats=GREENS.map(c=>new THREE.MeshLambertMaterial({color:c}));
  for(let i=0;i<1100;i++){
    let x=rnd(-MAP,MAP),z=rnd(-MAP,MAP); if(inRiver(x,z)) continue;
    const t=new THREE.Mesh(new THREE.ConeGeometry(0.1,rnd(0.4,0.95),4), grassMats[i%grassMats.length]);
    t.position.set(x,0.3,z); t.rotation.y=rnd(0,6.28); scene.add(t);
  }
  // 꽃
  const fcol=[0xff6a8a,0xffd23a,0xffffff,0xb06aff,0xff9a4a];
  for(let i=0;i<90;i++){
    let x=rnd(-MAP,MAP),z=rnd(-MAP,MAP); if(inRiver(x,z)) continue;
    const st=new THREE.Mesh(new THREE.CylinderGeometry(0.025,0.025,0.5,4), new THREE.MeshLambertMaterial({color:0x3a8a3a})); st.position.set(x,0.25,z); scene.add(st);
    const fl=new THREE.Mesh(new THREE.SphereGeometry(0.13,6,5), new THREE.MeshLambertMaterial({color:fcol[i%fcol.length]})); fl.position.set(x,0.55,z); scene.add(fl);
    for(let p=0;p<5;p++){ const pet=new THREE.Mesh(new THREE.SphereGeometry(0.07,5,4), new THREE.MeshLambertMaterial({color:fcol[i%fcol.length]})); const a=p/5*6.28; pet.position.set(x+Math.cos(a)*0.13,0.55,z+Math.sin(a)*0.13); scene.add(pet); }
  }
  // 흙 길 자국
  const dirtMat=new THREE.MeshLambertMaterial({color:0x6e5536});
  for(let i=0;i<60;i++){ let x=rnd(-MAP,MAP),z=rnd(-MAP,MAP); if(inRiver(x,z))continue; const d=new THREE.Mesh(new THREE.CircleGeometry(rnd(1.5,3),7), dirtMat); d.rotation.x=-Math.PI/2; d.position.set(x,0.015,z); scene.add(d); }
}
const GREENS=[0x2e7d32,0x357d31,0x3a9d3a,0x276b29,0x4aa54a];
// 공유 재질(성능: 재질 수천개 만들지 않게)
const TRUNK_MATS=[0x6b4423,0x7a5230,0x5e3a1c].map(c=>new THREE.MeshLambertMaterial({color:c}));
const LEAF_MATS=GREENS.map(c=>new THREE.MeshLambertMaterial({color:c}));
function makeTree(x,z){
  const g=new THREE.Group(); const h=rnd(4.5,7.5);
  const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.28,0.55,h,6), TRUNK_MATS[Math.floor(rand()*TRUNK_MATS.length)]);
  trunk.position.y=h/2; g.add(trunk);
  if(rand()<0.5){
    for(let i=0;i<3;i++){ const cone=new THREE.Mesh(new THREE.ConeGeometry(2.6-i*0.6,2.4,7), LEAF_MATS[i%LEAF_MATS.length]); cone.position.y=h-1+i*1.5; g.add(cone); }
  } else {
    for(let i=0;i<3;i++){ const r=rnd(1.5,2.3); const b=new THREE.Mesh(new THREE.SphereGeometry(r,7,6), LEAF_MATS[Math.floor(rand()*LEAF_MATS.length)]); b.position.set(rnd(-1.2,1.2),h+rnd(-0.3,1.4),rnd(-1.2,1.2)); g.add(b); }
  }
  g.position.set(x,0,z); g.rotation.y=rnd(0,6.28); g.scale.setScalar(rnd(0.8,1.25)); scene.add(g);
  return {grp:g, hp:5, type:"tree"};
}
function makeRock(x,z){
  const g=new THREE.Group(); const s=rnd(0.9,1.7);
  const main=new THREE.Mesh(new THREE.DodecahedronGeometry(s,0), new THREE.MeshLambertMaterial({color:0x8a8f96,flatShading:true}));
  main.position.y=s*0.5; main.rotation.set(rnd(0,3),rnd(0,3),rnd(0,3)); main.castShadow=true; main.receiveShadow=true; g.add(main);
  for(let i=0;i<3;i++){ const ss=s*rnd(0.3,0.55); const r2=new THREE.Mesh(new THREE.DodecahedronGeometry(ss,0), new THREE.MeshLambertMaterial({color:0x7d828a,flatShading:true})); r2.position.set(rnd(-s,s),ss*0.4,rnd(-s,s)); r2.rotation.set(rnd(0,3),rnd(0,3),rnd(0,3)); r2.castShadow=true; g.add(r2); }
  const moss=new THREE.Mesh(new THREE.SphereGeometry(s*0.55,7,6,0,Math.PI*2,0,Math.PI*0.42), new THREE.MeshLambertMaterial({color:0x4a7d3a})); moss.position.y=s*0.92; g.add(moss);
  g.position.set(x,0,z); scene.add(g);
  return {grp:g, hp:4, type:"rock"};
}
function makeBush(x,z){
  const g=new THREE.Group();
  for(let i=0;i<4;i++){
    const b=new THREE.Mesh(new THREE.SphereGeometry(rnd(0.6,1.05),7,6), LEAF_MATS[Math.floor(rand()*LEAF_MATS.length)]);
    b.position.set(rnd(-0.7,0.7),rnd(0.45,0.95),rnd(-0.7,0.7)); b.castShadow=true; g.add(b);
  }
  // 빨간 열매
  for(let i=0;i<3;i++){ const berry=new THREE.Mesh(new THREE.SphereGeometry(0.1,5,4), new THREE.MeshLambertMaterial({color:0xd6304a})); berry.position.set(rnd(-0.6,0.6),rnd(0.6,1.1),rnd(-0.6,0.6)); g.add(berry); }
  g.position.set(x,0,z); scene.add(g);
  return {grp:g, hp:3, type:"bush"};
}
function makeHerb(x,z){
  const g=new THREE.Group(); const mat=new THREE.MeshLambertMaterial({color:0x9be86a});
  for(let i=0;i<4;i++){
    const leaf=new THREE.Mesh(new THREE.ConeGeometry(0.18,0.7,4), mat);
    leaf.position.set(rnd(-0.25,0.25),0.35,rnd(-0.25,0.25)); leaf.rotation.z=rnd(-0.4,0.4); g.add(leaf);
  }
  const flower=new THREE.Mesh(new THREE.SphereGeometry(0.16,6,5), new THREE.MeshLambertMaterial({color:0xffe066}));
  flower.position.y=0.7; g.add(flower);
  g.position.set(x,0,z); scene.add(g);
  return {grp:g, type:"herb"};
}

// ---------- 플레이어 ----------
function buildPlayer(){
  player=new THREE.Group();
  const girl = Math.random()<0.5;
  const skin=[0xf2c89a,0xe8b486,0xffd9b0,0xcd9b6a][Math.floor(Math.random()*4)];
  const cloth = girl?[0xff7ab0,0xff9a4a,0xb06aff][Math.floor(Math.random()*3)]:[0x4f8fff,0x4faf6a,0xe2c23a][Math.floor(Math.random()*3)];
  const hair = girl?[0x5a3220,0x2a2a2a,0x7a4a28][Math.floor(Math.random()*3)]:[0x2a2a2a,0x4a3020,0x6a4828][Math.floor(Math.random()*3)];
  const skinMat=new THREE.MeshLambertMaterial({color:skin});
  const hairMat=new THREE.MeshLambertMaterial({color:hair});
  // 몸통(셔츠) + 바지
  const torso=new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.38,0.75,10), new THREE.MeshLambertMaterial({color:cloth}));
  torso.position.y=1.15; torso.castShadow=true; player.add(torso);
  const hips=new THREE.Mesh(new THREE.CylinderGeometry(0.34,0.3,0.3,8), new THREE.MeshLambertMaterial({color:0x33405a}));
  hips.position.y=0.78; hips.castShadow=true; player.add(hips);
  // 목 + 머리
  const neck=new THREE.Mesh(new THREE.CylinderGeometry(0.11,0.11,0.14,6), skinMat); neck.position.y=1.6; player.add(neck);
  const head=new THREE.Mesh(new THREE.SphereGeometry(0.31,14,12), skinMat); head.position.y=1.88; head.castShadow=true; player.add(head);
  // 눈/코/입
  for(const ex of [-1,1]){
    const w=new THREE.Mesh(new THREE.SphereGeometry(0.06,6,5), new THREE.MeshLambertMaterial({color:0xffffff})); w.position.set(ex*0.12,1.92,0.26); player.add(w);
    const p=new THREE.Mesh(new THREE.SphereGeometry(0.032,6,5), new THREE.MeshLambertMaterial({color:0x1a1a2a})); p.position.set(ex*0.12,1.92,0.3); player.add(p);
  }
  const nose=new THREE.Mesh(new THREE.SphereGeometry(0.04,5,4), skinMat); nose.position.set(0,1.85,0.32); player.add(nose);
  const mouth=new THREE.Mesh(new THREE.BoxGeometry(0.13,0.025,0.02), new THREE.MeshLambertMaterial({color:0xb05a4a})); mouth.position.set(0,1.76,0.29); player.add(mouth);
  // 머리카락
  const cap=new THREE.Mesh(new THREE.SphereGeometry(0.335,14,12,0,Math.PI*2,0,Math.PI*0.62), hairMat); cap.position.y=1.92; player.add(cap);
  if(girl){
    const back=new THREE.Mesh(new THREE.BoxGeometry(0.46,0.62,0.22), hairMat); back.position.set(0,1.68,-0.16); player.add(back);
    for(const ex of [-1,1]){ const tw=new THREE.Mesh(new THREE.CylinderGeometry(0.07,0.045,0.66,6), hairMat); tw.position.set(ex*0.3,1.56,-0.05); player.add(tw); }
  } else {
    const fringe=new THREE.Mesh(new THREE.BoxGeometry(0.5,0.12,0.1), hairMat); fringe.position.set(0,2.02,0.2); player.add(fringe);
  }
  // 팔/다리(손·신발 포함)
  const armMat=new THREE.MeshLambertMaterial({color:cloth});
  const legMat=new THREE.MeshLambertMaterial({color:0x33405a});
  const shoeMat=new THREE.MeshLambertMaterial({color:0x222222});
  player.userData.armL=mkLimb(armMat,-0.42,1.45,player,{geo:new THREE.SphereGeometry(0.1,7,6),mat:skinMat});
  player.userData.armR=mkLimb(armMat, 0.42,1.45,player,{geo:new THREE.SphereGeometry(0.1,7,6),mat:skinMat});
  player.userData.legL=mkLimb(legMat,-0.16,0.78,player,{geo:new THREE.BoxGeometry(0.2,0.13,0.34),mat:shoeMat,fz:0.08});
  player.userData.legR=mkLimb(legMat, 0.16,0.78,player,{geo:new THREE.BoxGeometry(0.2,0.13,0.34),mat:shoeMat,fz:0.08});
  // 무기
  const w=new THREE.Mesh(new THREE.BoxGeometry(0.1,0.1,1.4), new THREE.MeshLambertMaterial({color:0x8a5a2a}));
  w.position.set(0.55,1.2,0.3); w.visible=false; player.userData.weaponMesh=w; player.add(w);
  player.userData.swing=0;
  player.position.set(0,0,0); scene.add(player);
}
function mkLimb(mat,x,y,parent,end){
  const len=0.7, m=new THREE.Group();
  const seg=new THREE.Mesh(new THREE.BoxGeometry(0.16,len,0.16), mat);
  seg.position.y=-len/2; seg.castShadow=true; m.add(seg);
  if(end){ const e=new THREE.Mesh(end.geo,end.mat); e.position.set(0,-len-0.02,end.fz||0); m.add(e); }
  m.position.set(x,y,0); parent.add(m); return m;
}

// ---------- 동물 ----------
const ANIMAL_DEF={
  chicken:{emoji:"🐔",color:0xf5f0e0,hp:10,dmg:0,meat:15,danger:false,speed:3,count:60,size:0.5},
  rabbit :{emoji:"🐰",color:0xddddd5,hp:8,dmg:0,meat:12,danger:false,speed:4,count:50,size:0.45},
  deer   :{emoji:"🦌",color:0xb07a3a,hp:18,dmg:0,meat:28,danger:false,speed:5.5,count:45,size:0.85},
  fox    :{emoji:"🦊",color:0xe07a2a,hp:14,dmg:6,meat:14,danger:true,speed:4.6,count:38,size:0.5},
  snake  :{emoji:"🐍",color:0x6a8f2a,hp:15,dmg:8,meat:15,danger:true,speed:2.6,count:70,size:0.4,poison:true},
  pig    :{emoji:"🐷",color:0xe8a0b0,hp:40,dmg:12,meat:35,danger:true,speed:2.4,count:40,size:0.8},
  wolf   :{emoji:"🐺",color:0x888d92,hp:30,dmg:15,meat:30,danger:true,speed:4.2,count:45,size:0.7},
  tiger  :{emoji:"🐯",color:0xe8902a,hp:70,dmg:25,meat:50,danger:true,speed:4.5,count:30,size:0.95},
  bear   :{emoji:"🐻",color:0x6b4423,hp:130,dmg:35,meat:80,danger:true,speed:2.8,count:16,size:1.3,boss:true},
  dragon :{emoji:"🐉",color:0x7a4ab0,hp:500,dmg:50,meat:200,danger:true,speed:3.4,count:1,size:2.2,boss:true,fly:true,flyH:8,electro:true},
};
function playerMult(){ return NET.active ? (NET.playerN||1) : 1; }
function spawnAnimals(){
  const mult=playerMult();
  for(const key in ANIMAL_DEF){
    const d=ANIMAL_DEF[key];
    const cnt = (key==="dragon") ? d.count : d.count*mult; // 드래곤은 전설이라 1마리 고정
    for(let i=0;i<cnt;i++){
      let x=rnd(-MAP,MAP),z=rnd(-MAP,MAP); if(inRiver(x,z)) z+=12;
      animals.push(makeAnimal(key,d,x,z));
    }
  }
}
function addEyes(head,r,zf){
  for(const ex of [-1,1]){
    const w=new THREE.Mesh(new THREE.SphereGeometry(r*0.22,6,5), new THREE.MeshLambertMaterial({color:0xffffff})); w.position.set(ex*r*0.45,r*0.2,zf*0.9); head.add(w);
    const p=new THREE.Mesh(new THREE.SphereGeometry(r*0.11,6,5), new THREE.MeshLambertMaterial({color:0x111111})); p.position.set(ex*r*0.45,r*0.2,zf*1.05); head.add(p);
  }
}
function makeAnimal(key,d,x,z){
  const g=new THREE.Group(); const s=d.size;
  const mat=new THREE.MeshLambertMaterial({color:d.color});
  const dark=new THREE.MeshLambertMaterial({color:0x4a3a2a});
  const blackMat=new THREE.MeshLambertMaterial({color:0x222222});
  if(key==="snake"){
    for(let i=0;i<6;i++){ const c=new THREE.Mesh(new THREE.SphereGeometry(s*0.45-i*0.025,8,6), mat); c.position.set(Math.sin(i*1.1)*s*0.35,s*0.42,(i-2.5)*s*0.5); c.castShadow=true; g.add(c); }
    const head=new THREE.Mesh(new THREE.SphereGeometry(s*0.52,8,7), mat); head.position.set(Math.sin(-1.1)*s*0.35,s*0.46,-3.5*s*0.5); head.castShadow=true; g.add(head);
    addEyes(head,s*0.52,-1);
    const tongue=new THREE.Mesh(new THREE.BoxGeometry(s*0.05,s*0.05,s*0.45), new THREE.MeshLambertMaterial({color:0xff3a4a})); tongue.position.set(Math.sin(-1.1)*s*0.35,s*0.46,-3.5*s*0.5-s*0.5); g.add(tongue);
  } else if(key==="dragon"){
    const dmat=new THREE.MeshLambertMaterial({color:d.color});
    const body=new THREE.Mesh(new THREE.SphereGeometry(s*0.7,12,10), dmat); body.scale.set(1,0.85,1.7); body.castShadow=true; g.add(body);
    const neck=new THREE.Mesh(new THREE.CylinderGeometry(s*0.26,s*0.4,s*1.2,8), dmat); neck.position.set(0,s*0.55,s*0.9); neck.rotation.x=-0.6; g.add(neck);
    const head=new THREE.Mesh(new THREE.BoxGeometry(s*0.55,s*0.5,s*0.8), dmat); head.position.set(0,s*1.0,s*1.5); g.add(head);
    for(const ex of [-1,1]){ const eye=new THREE.Mesh(new THREE.SphereGeometry(s*0.1,7,6), new THREE.MeshBasicMaterial({color:0x9affff})); eye.position.set(ex*s*0.18,s*1.1,s*1.82); g.add(eye); }
    for(const ex of [-1,1]){ const horn=new THREE.Mesh(new THREE.ConeGeometry(s*0.09,s*0.55,5), new THREE.MeshLambertMaterial({color:0xe8e0ff})); horn.position.set(ex*s*0.18,s*1.42,s*1.25); horn.rotation.x=-0.4; g.add(horn); }
    // 날개(펄럭임)
    const wingMat=new THREE.MeshLambertMaterial({color:0x8a4ac0, side:THREE.DoubleSide, transparent:true, opacity:0.93});
    const wl=new THREE.Group(); const wlm=new THREE.Mesh(new THREE.ConeGeometry(s*1.7,0.18,3), wingMat); wlm.rotation.z=Math.PI/2; wlm.position.x=-s*1.5; wl.add(wlm); wl.position.set(-s*0.25,s*0.4,0); g.add(wl);

const _labelMats={};

const joy={active:false,x:0,y:0,id:null};
const joyEl=document.getElementById("joy"), knob=document.getElementById("joyKnob");
function joyStart(e){ const t=e.changedTouches?e.changedTouches[0]:e; joy.active=true; joy.id=t.identifier; joyMove(e); }
function joyMove(e){
  if(!joy.active) return;
  let t=e;
  if(e.changedTouches){ t=null; for(const c of e.changedTouches){ if(c.identifier===joy.id){t=c;break;} } if(!t) return; }
  const rect=joyEl.getBoundingClientRect();
  let dx=t.clientX-(rect.left+rect.width/2), dy=t.clientY-(rect.top+rect.height/2);
  const max=48, d=Math.hypot(dx,dy);
  if(d>max){ dx=dx/d*max; dy=dy/d*max; }
  knob.style.left=(35+dx)+"px"; knob.style.top=(35+dy)+"px";
  joy.x=dx/max; joy.y=dy/max;
}
function joyEnd(e){
  if(e.changedTouches){ let f=false; for(const c of e.changedTouches){ if(c.identifier===joy.id) f=true; } if(!f) return; }
  joy.active=false; joy.x=0; joy.y=0; knob.style.left="35px"; knob.style.top="35px";
}
joyEl.addEventListener("touchstart",e=>{e.preventDefault();joyStart(e);},{passive:false});
joyEl.addEventListener("touchmove",e=>{e.preventDefault();joyMove(e);},{passive:false});
joyEl.addEventListener("touchend",e=>{e.preventDefault();joyEnd(e);},{passive:false});
joyEl.addEventListener("mousedown",joyStart);
addEventListener("mousemove",e=>{ if(joy.active && !('ontouchstart' in window)) joyMove(e); });
addEventListener("mouseup",e=>{ if(joy.active && !('ontouchstart' in window)) joyEnd(e); });

let camYaw=0, camPitch=0.62;
const look={active:false,id:null,lx:0,ly:0};
function lookStart(e){ const t=e.changedTouches?e.changedTouches[0]:e; look.active=true; look.id=t.identifier; look.lx=t.clientX; look.ly=t.clientY; }
function lookMove(e){
  if(!look.active) return;
  let t=e;
  if(e.changedTouches){ t=null; for(const c of e.changedTouches){ if(c.identifier===look.id){t=c;break;} } if(!t) return; }
  const dx=t.clientX-look.lx, dy=t.clientY-look.ly; look.lx=t.clientX; look.ly=t.clientY;
  camYaw -= dx*0.006;
  camPitch = Math.max(0.16, Math.min(1.35, camPitch - dy*0.005));
}
function lookEnd(e){ if(e.changedTouches){ let f=false; for(const c of e.changedTouches){ if(c.identifier===look.id) f=true; } if(!f) return; } look.active=false; }

function attackDown(){
  if(S.mode!=="play") return;
  if(S.weapon==="bow" && S.has.bow){ bowHolding=true; S.bowCharge=0; }
  else attack();
}
function attackUp(){ if(S.weapon==="bow" && bowHolding){ bowHolding=false; shootArrow(); } }

// ---------- 공격 ----------
function dist(v){ return Math.hypot(player.position.x-v.x, player.position.z-v.z); }
function weaponDmg(){
  if(S.weapon==="spear"&&S.has.spear) return 7;
  if(S.weapon==="axe"&&S.has.axe) return 10;
  if(S.weapon==="bow"&&S.has.bow) return 13;
  return 1;
}
function damageWeapon(){
  const w=S.weapon;
  if(w==="hand"||!S.has[w]) return;
  S.dur[w]--;
  if(S.dur[w]<=3 && S.dur[w]>0) toast("⚠️ 무기에 금이 갔어!");
  if(S.dur[w]<=0){ S.has[w]=false; S.weapon="hand"; toast("💥 무기가 부서졌다!"); updateWeaponMesh(); }
}
function attack(){
  if(S.mode!=="play"||!S.alive) return;
  if(S.weapon==="electro"){ throwElectro(); return; }
  if(S.stamina<=0){ toast("힘이 없어! 😵 쉬어야 해"); return; }
  const dmg=weaponDmg();
  let best=null,bd=3.6;
  for(const a of animals){ if(!a.alive) continue; const d=dist(a.grp.position); if(d<bd){bd=d;best=a;} }
  swingArm(); useStamina(6); damageWeapon();
  if(best) hitAnimal(best,dmg); else toast("허공을 휘둘렀다…");
}
function dropMeat(a){
  if(a.type==="dragon"){
    S.electro+=3;
    bigMsg("🐉 드래곤 처치!! ⚡ 일렉트볼 3개 획득!");
    toast("🏆 숲의 전설을 쓰러뜨렸다!");
    let got=0; while(foodCount()<S.maxSlots && got<3){ S.food.rawmeat++; got++; }
    return;
  }
  const drop=Math.max(1,Math.round(ANIMAL_DEF[a.type].meat/15));
  let got=0; for(let i=0;i<drop;i++){ if(foodCount()<S.maxSlots){ S.food.rawmeat++; got++; } }
  toast(ANIMAL_DEF[a.type].emoji+" 사냥! 날고기 +"+got+(got<drop?" (가방 꽉참)":" 🍖"));
}
function hitAnimal(a,dmg){
  a.hp-=dmg; bloodFx(a.grp.position);
  if(a.danger && a.hp>0) a.aggro=true;
  if(a.hp<=0){
    a.alive=false; scene.remove(a.grp);
    dropMeat(a);
  }
}
function throwElectro(){
  if(S.electro<=0){ toast("일렉트볼이 없어! ⚡"); S.weapon="hand"; updateWeaponMesh(); return; }
  S.electro--;
  const fx=Math.sin(playerYaw), fz=Math.cos(playerYaw);
  const ex=player.position.x+fx*8, ez=player.position.z+fz*8;
  electricExplosion(ex,ez); swingArm();
  let kills=0;
  for(const a of animals){ if(!a.alive) continue;
    if(Math.hypot(a.grp.position.x-ex,a.grp.position.z-ez)<5){
      a.hp-=100; bloodFx(a.grp.position); if(a.danger)a.aggro=true;
      if(a.hp<=0){ a.alive=false; scene.remove(a.grp); kills++; }
    }
  }
  toast("⚡ 일렉트볼 폭발! 100뎀"+(kills?" ("+kills+"마리!)":""));
  if(S.electro<=0){ S.weapon="hand"; updateWeaponMesh(); }
}
function dragonZap(a){
  lightningFx(a.grp.position, player.position);
  SFX.zap();
  S.hp-=50; S.stunTime=3; shakeScreen(); whiteFlash();
  toast("⚡ 드래곤 전기 공격! 감전돼서 3초간 못 움직여!");
  if(S.hp<=0 && S.alive){ S.hp=0; deathCinematic("드래곤에게 감전사"); }
}
function lightningFx(from,to){
  const a=new THREE.Vector3(from.x,from.y,from.z), b=new THREE.Vector3(to.x,to.y+1.2,to.z);
  const dir=new THREE.Vector3().subVectors(b,a); const len=dir.length();
  const bolt=new THREE.Mesh(new THREE.CylinderGeometry(0.14,0.14,len,5), new THREE.MeshBasicMaterial({color:0xaef0ff}));
  bolt.position.copy(a).add(b).multiplyScalar(0.5);
  bolt.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.clone().normalize());
  scene.add(bolt); setTimeout(()=>scene.remove(bolt),200);
}
function electricExplosion(x,z){
  const g=new THREE.Group();
  const ball=new THREE.Mesh(new THREE.SphereGeometry(1.2,10,8), new THREE.MeshBasicMaterial({color:0x7adfff,transparent:true,opacity:0.85}));
  ball.position.set(x,1.3,z); g.add(ball);
  const light=new THREE.PointLight(0x7adfff,3,16); light.position.set(x,2,z); g.add(light);
  for(let i=0;i<8;i++){ const bz=new THREE.Mesh(new THREE.BoxGeometry(0.12,0.12,rnd(1.2,2.6)), new THREE.MeshBasicMaterial({color:0xaef0ff})); bz.position.set(x,1.4,z); bz.rotation.y=i/8*6.28; g.add(bz); }
  scene.add(g); whiteFlash();
  let tt=0; const iv=setInterval(()=>{ tt+=0.05; ball.scale.setScalar(1+tt*4); ball.material.opacity=Math.max(0,0.85-tt*1.7); if(tt>0.5){ clearInterval(iv); scene.remove(g); } },30);
}
function shootArrow(){
  if(S.mat.arrow<=0){ toast("화살이 없어! 🏹"); S.bowCharge=0; return; }
  if(S.stamina<=0){ toast("힘이 없어! 😵"); return; }
  S.mat.arrow--;
  const charge=Math.min(1,S.bowCharge);
  const dmg=Math.max(4,Math.round(13*charge));
  useStamina(5); damageWeapon();
  const fx=Math.sin(playerYaw), fz=Math.cos(playerYaw);
  let best=null,bestScore=0.6;
  for(const a of animals){ if(!a.alive)continue;
    const dx=a.grp.position.x-player.position.x, dz=a.grp.position.z-player.position.z;
    const d=Math.hypot(dx,dz); if(d>22) continue;
    const dot=(dx*fx+dz*fz)/(d||1);
    if(dot>bestScore){ bestScore=dot; best=a; }
  }
  swingArm();
  if(best) hitAnimal(best,dmg); else toast("화살이 빗나갔다");
  S.bowCharge=0;
}

// ---------- 행동 ----------
function doAction(){
  if(S.mode!=="play"||!S.alive) return;
  if(S.sleeping){ wake(); return; }
  const n=S.near;
  if(!n){ toast("주변에 할 게 없어"); return; }
  if(n.kind==="heli"){ boardHeli(); return; }
  if(n.kind==="bed"){ sleep(); return; }
  if(n.kind==="campfire"){ cook(); return; }
  if(n.kind==="wall"){ repairWall(n.obj); return; }
  if(n.kind==="water"){ drink(n.clean); return; }
  if(n.kind==="bug"){ catchBug(n.obj); return; }
  if(n.kind==="fish"){ catchFish(n.obj); return; }
  if(n.kind==="herb"){ pickHerb(n.obj); return; }
  if(n.kind==="tree"){ chop(n.obj); return; }
  if(n.kind==="rock"){ mine(n.obj); return; }
  if(n.kind==="bush"){ gather(n.obj); return; }
}
function chop(t){
  if(S.stamina<=0){ toast("힘이 없어! 😵"); return; }
  const fast = (S.weapon==="axe"&&S.has.axe);
  useStamina(fast?7:12); if(fast) damageWeapon();
  t.hp -= fast?2:0.7; S.mat.wood += fast?2:1;
  swingArm(); shakeObj(t.grp);
  toast("나무 +"+(fast?2:1)+" 🪵 (총 "+S.mat.wood+")");
  if(t.hp<=0){ scene.remove(t.grp); const i=trees.indexOf(t); if(i>=0)trees.splice(i,1); }
}
function mine(r){
  if(S.stamina<=0){ toast("힘이 없어! 😵"); return; }
  const fast=(S.weapon==="axe"&&S.has.axe);
  useStamina(10); if(fast)damageWeapon();
  r.hp -= fast?2:1; S.mat.stone += 1;
  swingArm(); shakeObj(r.grp);
  toast("돌 +1 🪨 (총 "+S.mat.stone+")");
  if(r.hp<=0){ scene.remove(r.grp); const i=rocks.indexOf(r); if(i>=0)rocks.splice(i,1); }
}
function gather(b){
  useStamina(4); S.mat.vine += 2;
  let m="덩굴 +2 🌿";
  if(Math.random()<0.5 && addFood("berry",1)) m+=" + 열매 🫐";
  shakeObj(b.grp); toast(m);
  b.hp--; if(b.hp<=0){ scene.remove(b.grp); const i=bushes.indexOf(b); if(i>=0)bushes.splice(i,1); }
}
function pickHerb(h){
  if(addFood("herb",1)){ toast("약초 +1 🩹 (독 치료용)"); scene.remove(h.grp); const i=herbs.indexOf(h); if(i>=0)herbs.splice(i,1); }
}
function drink(clean){
  if(clean){ S.thirst=Math.min(100,S.thirst+25); toast("깨끗한 물! 목마름 회복 💧"); }
  else { S.thirst=Math.min(100,S.thirst+18); S.hp=Math.max(0,S.hp-5); toast("더러운 물… 체력 -5 🤢"); damageFlash(); }

function placeWall(){

  const ux=Math.cos(playerYaw), uz=-Math.sin(playerYaw);   // 길이 축

  const g=new THREE.Group();
  const wall=new THREE.Mesh(new THREE.BoxGeometry(5,2.4,0.55), new THREE.MeshLambertMaterial({color:0x8a6a3a}));
  wall.position.y=1.2; wall.castShadow=true; g.add(wall);

  g.position.set(x,0,z); g.rotation.y=playerYaw; scene.add(g);
  walls.push({grp:g, x, z, ux, uz, vx, vz, halfW:2.5, halfT:0.45, hp:300, maxhp:300});
}
function resolveWalls(o, radius){
  for(const w of walls){
    const dx=o.x-w.x, dz=o.z-w.z;
    const u=dx*w.ux+dz*w.uz, v=dx*w.vx+dz*w.vz;
    if(Math.abs(u)<w.halfW+radius && Math.abs(v)<w.halfT+radius){
      const sign=v>=0?1:-1, nv=sign*(w.halfT+radius);
      o.x=w.x+u*w.ux+nv*w.vx; o.z=w.z+u*w.uz+nv*w.vz;
    }
  }
}

function tapEnemy(i){ heliTargetIdx=i; heliAttack(i); }
function heliAttack(forced){
  if(!HE.running) return;
  let i = (typeof forced==="number")?forced:heliTargetIdx;
  const dmg = weaponDmg()===1?6:weaponDmg();
  if(HE.phase==="fight"){
    let t=HE.enemies[i];
    if(!t || t.dead){ i=HE.enemies.findIndex(x=>!x.dead); if(i<0) return; t=HE.enemies[i]; }
    t.hp-=dmg; flashEnemy(t);
    if(t.hp<=0){ t.hp=0; t.dead=true; t.el.classList.add("dead"); }
    if(HE.enemies.every(x=>x.dead)){
      HE.phase="confirm"; HE.timer=8;
      setHeliInfo("쓰러졌다! 근데 한 명은 죽은 척이야… 시체를 다 무기로 때려! (확인사살)");
      HE.enemies.forEach(x=>{ x.el.querySelector(".tag").textContent="때려!"; });
    }
  } else if(HE.phase==="confirm"){
    const t=HE.enemies[i];
    if(t && !t.confirmed){
      t.confirmed=true; flashEnemy(t); t.el.querySelector(".tag").textContent="확인✔";
      if(t.fake) toast("죽은 척하던 놈이었어! 확인사살! ☠️");
    }
    if(HE.enemies.every(x=>x.confirmed)){
      HE.phase="win"; setHeliInfo("다 처리했다! 이제 조종해서 집으로! 🚁");

      document.getElementById("hPilot").style.display="";

  }
  updateHeliUI();
}

function winCinematic(){
  S.mode="cine"; document.getElementById("cine").classList.add("show"); S.cineAction=null;
  setCine("😆","문을 열어 적을 던져버렸다!","\"하하하하!\"");
  document.getElementById("cineBtn").style.display="none";
  setTimeout(()=>setCine("🚁","헬기를 조종해서 집으로…",""),2200);
  setTimeout(()=>{
    setCine("🏡","🎉 탈출 성공! 🎉<br>"+S.day+"일 만에 살아남았다!","너는 진짜 생존자다!");
    const b=document.getElementById("cineBtn"); b.style.display=""; b.textContent="다시 하기";
  },4600);
}
function loseCinematic(fakeRevive){
  S.mode="cine"; document.getElementById("cine").classList.add("show"); S.cineAction=null;
  if(fakeRevive) setCine("😨","죽은 줄 알았던 적이 일어났다…","총을 머리에 가까이 댄다…");
  else setCine("🔫","적이 멀리서 총을 겨눈다…","…슬로우모션…");
  document.getElementById("cineBtn").style.display="none";
  setTimeout(()=>{ whiteFlash(); setCine("💥","탕!",""); },2400);
  setTimeout(()=>{
    setCine("💀","사망…",S.day+"일째에 끝났다.");
    const b=document.getElementById("cineBtn"); b.style.display=""; b.textContent="타이틀로";
  },3600);
}
function deathCinematic(reason){
  S.alive=false; S.mode="cine"; document.getElementById("cine").classList.add("show"); S.cineAction=null;
  setCine("💀","죽었다…",reason+" · "+S.day+"일째");
  const b=document.getElementById("cineBtn"); b.style.display=""; b.textContent="타이틀로";
}
document.getElementById("cineBtn").addEventListener("click",()=>{ if(S.cineAction){ S.cineAction(); } else { location.reload(); } });

function bigMsg(t){ const m=document.getElementById("bigMsg"); m.textContent=t; m.style.opacity="1"; clearTimeout(m._t); m._t=setTimeout(()=>m.style.opacity="0",2200); }
function damageFlash(){ const v=document.getElementById("vig"); v.style.boxShadow="inset 0 0 120px 30px rgba(255,0,0,0.6)"; setTimeout(()=>v.style.boxShadow="inset 0 0 0 0 rgba(255,0,0,0)",250); }
function whiteFlash(){ const f=document.getElementById("flashWhite"); f.style.opacity="0.9"; setTimeout(()=>f.style.opacity="0",120); }
let shake=0;
function shakeScreen(){ shake=0.4; }
function shakeObj(o){ const sy=o.scale.y; o.scale.y=sy*0.85; setTimeout(()=>{o.scale.y=sy;},90); }
function swingArm(){ player.userData.swing=0.35; SFX.swing(); }
function bloodFx(pos){
  for(let i=0;i<6;i++){
    const p=new THREE.Mesh(new THREE.SphereGeometry(0.1,4,4), new THREE.MeshBasicMaterial({color:0xcc0000}));
    p.position.copy(pos); p.position.y+=1;
    p.userData.v=new THREE.Vector3(rnd(-2,2),rnd(2,5),rnd(-2,2)); p.userData.life=0.6;
    scene.add(p); drops.push({mesh:p, blood:true});
  }
}

  for(const r of RECIPES){

    const div=document.createElement("div"); div.className="row";
    div.innerHTML='<div class="ti">'+r.emoji+'</div><div class="tx"><b>'+r.name+eq+'</b><small>'+r.desc+'<br>재료: '+costStr(r.cost)+'</small></div>';
    const b=document.createElement("button"); b.textContent="만들기"; b.disabled=!ok; b.onclick=()=>doCraft(r); div.appendChild(b);

  }
  L.insertAdjacentHTML("beforeend",'<div class="seclabel">🏠 집 (침대에서 자면 회복)</div>');
  for(const h of HOUSES){

    div.innerHTML='<div class="ti">'+h.emoji+'</div><div class="tx"><b>'+h.name+cur+'</b><small>'+h.desc+'<br>재료: '+costStr(h.cost)+'</small></div>';
    const b=document.createElement("button"); b.textContent="짓기"; b.disabled=!ok; b.onclick=()=>buildHouse(h); div.appendChild(b);
    L.appendChild(div);

}
function renderBag(){
  const L=document.getElementById("bagList"); L.innerHTML="";
  L.insertAdjacentHTML("beforeend",'<div class="seclabel">🎒 음식/약초 ('+foodCount()+'/'+S.maxSlots+'칸)</div>');

    ["cookedmeat","🍖","구운 고기","배고픔+30 · 힘+15"],

    ["rawmeat","🥩","날고기","먹으면 독! 구워먹어"],
    ["rawfish","🐠","날생선","먹으면 독! 구워먹어"],
    ["berry","🫐","열매","배고픔+8"],
    ["herb","🩹","약초","독 1단계 치료"],
  ];

  for(const it of items){

  const wl=[["hand","✋","맨손"]];
  if(S.has.spear)wl.push(["spear","🪵","나무창("+S.dur.spear+")"]);
  if(S.has.axe)wl.push(["axe","🪓","돌도끼("+S.dur.axe+")"]);
  if(S.has.bow)wl.push(["bow","🏹","활("+S.dur.bow+")"]);
  if(S.electro>0)wl.push(["electro","⚡","일렉트볼 x"+S.electro+" (100뎀)"]);
  for(const w of wl){
    const k=w[0];
    const div=document.createElement("div"); div.className="row";

    const b=document.createElement("button"); b.textContent="장착"; b.onclick=()=>{ S.weapon=k; updateWeaponMesh(); renderBag(); }; div.appendChild(b);

function updateWeaponMesh(){
  if(!player) return;
  const w=player.userData.weaponMesh;
  if(S.weapon==="hand"){ w.visible=false; return; }
  w.visible=true;
  const colors={spear:0x9a6a2a, axe:0x8a8f96, bow:0x6b4423, electro:0x7adfff};
  w.material.color.setHex(colors[S.weapon]||0x8a5a2a);
}

// ---------- 루프 ----------
let last=0;
function loop(t){
  requestAnimationFrame(loop);
  const dt=Math.min(0.05,(t-last)/1000)||0; last=t;
  if(S.mode==="heli"){ updateHeli(dt); if(renderer)renderer.render(scene,camera); return; }
  if(S.mode!=="play"){ if(renderer)renderer.render(scene,camera); return; }
  updatePlayer(dt);
  updateStats(dt);
  updateAnimals(dt);
  updateSpikes(dt);
  updateFishBugs(dt);
  updateDayNight(dt);
  updateWeather(dt);
  updateHeliTimer(dt);
  updateNearest();
  updateDrops(dt);
  updateCamera(dt);
  updateHUD();
  cullFrame++; if(cullFrame%12===0) cullWorld();
  if(NET.active){ netTick(dt); netRenderRemotes(dt); }
  if(renderer) renderer.render(scene,camera);
}
let cullFrame=0;
function cullWorld(){
  const vd=300, vd2=vd*vd, px=player.position.x, pz=player.position.z;
  for(const arr of [trees,rocks,bushes,herbs]){
    for(const o of arr){ const dx=o.grp.position.x-px, dz=o.grp.position.z-pz; o.grp.visible=(dx*dx+dz*dz)<vd2; }
  }
  for(const a of animals){ if(!a.alive) continue; const dx=a.grp.position.x-px, dz=a.grp.position.z-pz; a.grp.visible=(dx*dx+dz*dz)<vd2; }
}
function t0(){ return performance.now()/1000; }
function useStamina(n){ S.stamina=Math.max(0,S.stamina-n); }

function updatePlayer(dt){
  if(S.sleeping){
    S.hp=Math.min(100,S.hp+S.houseRate*dt*6);
    S.stamina=Math.min(100,S.stamina+8*dt*6);
    S.phaseTime-=dt*6;
    return;
  }
  if(S.stunTime>0){
    S.stunTime-=dt;
    const v=document.getElementById("vig");
    v.style.boxShadow = S.stunTime>0 ? "inset 0 0 110px 26px rgba(110,180,255,0.5)" : "inset 0 0 0 0 rgba(0,0,0,0)";
    player.position.x+=rnd(-0.02,0.02); player.position.z+=rnd(-0.02,0.02);
    return;
  }
  let mx=joy.x, mz=joy.y;
  const mag=Math.hypot(mx,mz);
  if(mag>0.15){
    let spd = (S.stamina<=0)?3:6;
    // 카메라 방향 기준 이동
    const fx=Math.sin(camYaw), fz=Math.cos(camYaw), rx=-Math.cos(camYaw), rz=Math.sin(camYaw);
    const mvx=fx*(-mz)+rx*mx, mvz=fz*(-mz)+rz*mx;
    playerYaw=Math.atan2(mvx,mvz);
    let nx=player.position.x+mvx*spd*dt, nz=player.position.z+mvz*spd*dt;
    if(walls.length){ const np={x:nx,z:nz}; resolveWalls(np,0.5); nx=np.x; nz=np.z; }
    if(Math.hypot(nx,nz)<MAP){ player.position.x=nx; player.position.z=nz; }
    player.rotation.y=playerYaw;
    playerWalk+=dt*12;
    if(S.stamina>0) useStamina(3*dt);
    S._stepT=(S._stepT||0)-dt; if(S._stepT<=0){ SFX.step(); S._stepT=(S.stamina<=0?0.45:0.34); }
  } else playerWalk*=0.8;
  const sw=Math.sin(playerWalk)*0.5;
  player.userData.legL.rotation.x=sw; player.userData.legR.rotation.x=-sw;
  player.userData.armL.rotation.x=-sw*0.6;
  if(player.userData.swing>0){ player.userData.swing-=dt*1.5; player.userData.armR.rotation.x=-player.userData.swing*4; }
  else player.userData.armR.rotation.x=sw*0.6;
  if(bowHolding){ S.bowCharge=Math.min(1,S.bowCharge+dt*0.9); }
}
function updateStats(dt){
  if(!S.alive) return;
  S.hunger=Math.max(0,S.hunger-dt/10);
  S.thirst=Math.max(0,S.thirst-dt/7);
  let tempRate=dt/8;
  if(S.phase==="night"||S.weather==="rain") tempRate*=1.5;
  let nearFire=false;
  for(const f of campfires){ if(Math.hypot(player.position.x-f.x,player.position.z-f.z)<4){ nearFire=true; break; } }
  if(nearFire){ S.temp=Math.min(100,S.temp+dt*8); S.stamina=Math.min(100,S.stamina+dt*6); }
  else S.temp=Math.max(0,S.temp-tempRate);
  if(S.house==="돌집+화로" && S.bedPos && dist(S.bedPos)<6){ S.temp=Math.min(100,S.temp+dt*5); }
  if(Math.hypot(joy.x,joy.y)<0.15 && !S.sleeping){ S.stamina=Math.min(100,S.stamina+dt*4); }
  let drain=0;
  if(S.hunger<=0)drain++; if(S.thirst<=0)drain++; if(S.temp<=0)drain++;
  if(drain>0){ S.hp-=drain*dt; if(Math.random()<dt*2)damageFlash(); }
  if(S.poison>0){ S.hp-=S.poison*(10/60)*dt; }
  document.getElementById("poisonVig").style.background = S.poison>0 ?
    "radial-gradient(ellipse at center, transparent 45%, rgba(40,180,60,0.4) 100%)" :
    "radial-gradient(ellipse at center, transparent 55%, rgba(40,180,60,0) 100%)";
  if(S.hp<=0 && S.alive){ S.hp=0; deathCinematic("기력이 다했다"); }
}
function updateAnimals(dt){
  for(const a of animals){
    if(!a.alive) continue;
    const p=a.grp.position;
    const dx=player.position.x-p.x, dz=player.position.z-p.z;
    const d=Math.hypot(dx,dz)||1;
    a.wander-=dt; a.atkCd-=dt;
    if(a.fly){
      a.flap+=dt*8;
      const ud=a.grp.userData;
      if(ud.wingL){ ud.wingL.rotation.z=0.4+Math.sin(a.flap)*0.55; ud.wingR.rotation.z=-0.4-Math.sin(a.flap)*0.55; }
      a.zapCd-=dt;
      let targetH=(a.flyH||8);
      if(a.aggro || d<46){
        a.aggro=true;
        a.swoopCd-=dt;
        if(!a.swooping && a.swoopCd<=0){ a.swooping=true; a.swoopT=3; a.swoopCd=7; bigMsg("🐉 드래곤이 내려온다! 지금 공격!"); SFX.boom(); }
        if(a.swooping){ a.swoopT-=dt; if(a.swoopT<=0) a.swooping=false; }
        targetH = a.swooping?2.0:(a.flyH||8);
        const keep = a.swooping?1.5:9;
        const ms = a.speed*(a.swooping?1.7:1);
        if(d>keep){ p.x+=dx/d*ms*dt; p.z+=dz/d*ms*dt; }
        a.grp.rotation.y=Math.atan2(dx,dz);
        if(!a.swooping && d<26 && a.zapCd<=0){ a.zapCd=2.6; dragonZap(a); }
      } else {
        if(a.wander<=0){ a.vx=rnd(-1,1); a.vz=rnd(-1,1); a.wander=rnd(2,5); }
        let nx=p.x+a.vx*a.speed*dt, nz=p.z+a.vz*a.speed*dt;
        if(Math.hypot(nx,nz)<MAP){ p.x=nx; p.z=nz; }
        a.grp.rotation.y=Math.atan2(a.vx||0.01,a.vz||0.01);
      }
      const bob=Math.sin(t0()*1.5)*0.5;
      a.grp.position.y += ((targetH+bob) - a.grp.position.y) * Math.min(1, dt*2.5);
      continue;
    }
    let tx=0,tz=0;
    const isNight=(S.phase==="night");
    const dgr=a.danger||isNight;                 // 밤엔 순한 동물도 사나워짐
    const admg=a.dmg>0?a.dmg:(isNight?5:0);       // 원래 공격0인 동물은 밤에 5뎀
    if(dgr){
      const aggroR = a.boss?16:(isNight?9:6);
      if(a.aggro || d<aggroR){
        tx=dx/d; tz=dz/d;
        if(d<(a.boss?2.6:1.8) && a.atkCd<=0){
          a.atkCd=a.boss?1.8:1.4; S.hp-=admg; damageFlash(); shakeScreen();
          if(a.poison) addPoison();
          if(a.type==="wolf"||a.type==="tiger"||a.type==="bear") SFX.bite();
          if(a.boss) bigMsg("🐻 곰의 공격!");
          if(S.hp<=0&&S.alive){S.hp=0;deathCinematic(a.boss?"곰에게 당했다":"동물에게 당했다");}
        }
      } else if(!a.boss && d<15 && Math.random()<0.3){ tx=-dx/d; tz=-dz/d; }
      else { if(a.wander<=0){ a.vx=rnd(-1,1); a.vz=rnd(-1,1); a.wander=rnd(2,5);} tx=a.vx; tz=a.vz; }
    } else {
      if(d<8){ tx=-dx/d; tz=-dz/d; }
      else { if(a.wander<=0){ a.vx=rnd(-1,1); a.vz=rnd(-1,1); a.wander=rnd(2,5);} tx=a.vx; tz=a.vz; }
    }
    const sp=a.speed*( (dgr&&(a.aggro||d<6))?1:0.5 );
    let nx=p.x+tx*sp*dt, nz=p.z+tz*sp*dt;
    if(walls.length){ const np={x:nx,z:nz}; resolveWalls(np,0.6); nx=np.x; nz=np.z; }
    if(Math.hypot(nx,nz)<MAP && !inRiver(nx,nz)){ p.x=nx; p.z=nz; }
    if(tx||tz) a.grp.rotation.y=Math.atan2(tx,tz);
    // 벽에 막히면 벽을 때림
    if(dgr && admg>0 && walls.length && a.atkCd<=0){
      for(const w of walls){
        const adx=p.x-w.x, adz=p.z-w.z, u=adx*w.ux+adz*w.uz, v=adx*w.vx+adz*w.vz;
        const pv=(player.position.x-w.x)*w.vx+(player.position.z-w.z)*w.vz;
        if(Math.abs(u)<w.halfW+0.5 && Math.abs(v)<1.4 && (v>=0)!==(pv>=0)){
          a.atkCd=1.4; w.hp-=admg; shakeObj(w.grp);
          if(a.type==="wolf"||a.type==="tiger"||a.type==="bear") SFX.bite();
          if(w.hp<=0){ scene.remove(w.grp); const wi=walls.indexOf(w); if(wi>=0)walls.splice(wi,1); toast("🧱 벽이 부서졌다!"); }
          break;
        }
      }
    }
  }
}
function updateFishBugs(dt){
  for(const f of fishes){ if(!f.alive)continue;
    f.dir+=rnd(-1,1)*dt;
    let nx=f.grp.position.x+Math.sin(f.dir)*1.5*dt, nz=f.grp.position.z+Math.cos(f.dir)*1.5*dt;
    if(nx>f.r.minX+0.5&&nx<f.r.maxX-0.5) f.grp.position.x=nx; else f.dir+=2;
    if(nz>f.r.minZ+0.5&&nz<f.r.maxZ-0.5) f.grp.position.z=nz; else f.dir+=2;
    f.grp.rotation.y=Math.atan2(Math.sin(f.dir),Math.cos(f.dir));
    f.grp.position.y=0.2+Math.sin(t0()*4+f.dir)*0.05;
  }
  for(const b of bugs){ if(!b.alive)continue;
    b.t-=dt; if(b.t<=0){ b.vx=rnd(-1,1); b.vz=rnd(-1,1); b.t=rnd(1,3); }
    let nx=b.grp.position.x+(b.vx||0)*0.6*dt, nz=b.grp.position.z+(b.vz||0)*0.6*dt;
    if(Math.hypot(nx,nz)<MAP){ b.grp.position.x=nx; b.grp.position.z=nz; }
  }
}
function updateDayNight(dt){
  S.phaseTime-=dt;
  if(S.phaseTime<=0){
    if(S.phase==="day"){ S.phase="night"; S.phaseTime=S.nightLen; bigMsg("🌙 밤이다! 동물들이 사나워진다… 조심!"); }
    else { S.phase="day"; S.day++; S.nightLen+=30; S.phaseTime=180; bigMsg("☀️ "+S.day+"일째 아침"); }
  }
  if(S.day%10===0 && S.phase==="day" && !S.heliActive && S._heliSpawnedDay!==S.day){ spawnHelicopter(); S._heliSpawnedDay=S.day; }

  const night = S.phase==="night";
  let k = night?1:0;
  if(!night && S.phaseTime<30) k=(30-S.phaseTime)/30*0.6;
  if(night && S.phaseTime<25) k=1-(25-S.phaseTime)/25*0.6;
  const skyDay=new THREE.Color(0x9fd9ff), skyNight=new THREE.Color(0x0a1628);
  const sky=skyDay.clone().lerp(skyNight,k);
  scene.background=sky; scene.fog.color.copy(sky);
  sun.intensity = 1.1*(1-k*0.9);
  hemi.intensity = 0.7*(1-k*0.7);
  ambient.intensity = 0.25 + (night?0.05:0);
  if(S.weather==="rain"){ sun.intensity*=0.4; scene.fog.near=20; scene.fog.far=70; }
  else { scene.fog.near=40; scene.fog.far=110; }
  if(S.heliObj) S.heliObj.userData.rotor.rotation.y+=dt*20;
  for(const f of campfires){ f.fire.scale.y=1+Math.sin(t0()*12)*0.2; }
  // 물결 반짝임
  const tt=t0();
  for(const wm of waterMeshes){
    wm.position.y=0.06+Math.sin(tt*2+wm.position.x*0.3)*0.03;
    wm.material.opacity=0.78+Math.sin(tt*3+wm.position.z*0.2)*0.08;
  }
}
function updateWeather(dt){
  S.weatherT-=dt;
  if(S.weatherT<=0){
    if(S.weather==="clear"){ if(Math.random()<0.4){ S.weather="rain"; S.weatherT=rnd(20,40); bigMsg("🌧️ 비가 온다 (체온 조심!)"); } else S.weatherT=rnd(30,60); }
    else { S.weather="clear"; S.weatherT=rnd(40,80); bigMsg("☀️ 비가 그쳤다"); }
  }
}
function updateHeliTimer(dt){
  if(!S.heliActive) return;
  S.heliTimer-=dt;
  if(S.heliTimer<=0){ removeHelicopter(); bigMsg("🚁 헬기가 떠났다… 다음은 10일 뒤"); }
}
function updateNearest(){
  let best=false, bd=3.2, kind=null, obj=null, clean=false;
  function chk(d,k,o){ if(d<bd){ bd=d; kind=k; obj=o; best=true; } }
  if(S.heliPos && dist(S.heliPos)<5){ kind="heli"; best=true; bd=0; }
  if(!best){
    for(const t of trees) chk(dist(t.grp.position),"tree",t);
    for(const r of rocks) chk(dist(r.grp.position),"rock",r);
    for(const b of bushes) chk(dist(b.grp.position),"bush",b);
    for(const h of herbs) chk(dist(h.grp.position),"herb",h);
    for(const f of fishes){ if(f.alive) chk(dist(f.grp.position),"fish",f); }
    for(const b of bugs){ if(b.alive) chk(dist(b.grp.position),"bug",b); }
    for(const f of campfires) chk(dist(f),"campfire",f);
    for(const w of walls) chk(dist(w),"wall",w);
    if(S.bedPos) chk(dist(S.bedPos),"bed",null);
    if(dist(springPos)<4){ kind="water"; clean=true; best=true; bd=0; }
    else {
      const px=player.position.x, pz=player.position.z;
      for(const r of rivers){
        const cx=Math.max(r.minX,Math.min(px,r.maxX)), cz=Math.max(r.minZ,Math.min(pz,r.maxZ));
        if(Math.hypot(px-cx,pz-cz)<3 && bd>2){ kind="water"; clean=true; best=true; bd=2; }
      }
    }
  }
  S.near = best ? {kind, obj, clean} : null;
  const lbl=document.getElementById("actLabel");
  const txt={tree:"🪵 나무 베기",rock:"🪨 돌 캐기",bush:"🌿 덩굴 줍기",herb:"🩹 약초 캐기",
    fish:"🐟 물고기 잡기",bug:"🐛 벌레 잡기",campfire:"🔥 요리하기",bed:"😴 자기",water:"💧 물 마시기",heli:"🚁 헬기 타기",wall:"🧱 벽 수리"};
  const actTxt={tree:"베기",rock:"캐기",bush:"줍기",herb:"캐기",fish:"잡기",bug:"잡기",campfire:"요리",bed:"자기",water:"마시기",heli:"타기",wall:"수리"};
  if(S.sleeping){ lbl.textContent="😴 자는 중 (행동=일어나기)"; lbl.classList.remove("hidden"); document.getElementById("bActTxt").textContent="기상"; }
  else if(S.near){ let lt=txt[S.near.kind]||""; if(S.near.kind==="wall"&&S.near.obj) lt="🧱 벽 수리 (나무3→+100) "+Math.round(S.near.obj.hp)+"/300"; lbl.textContent=lt; lbl.classList.remove("hidden"); document.getElementById("bActTxt").textContent=actTxt[S.near.kind]||"행동"; }
  else { lbl.classList.add("hidden"); document.getElementById("bActTxt").textContent="행동"; }
}
function updateDrops(dt){
  for(let i=drops.length-1;i>=0;i--){
    const d=drops[i];
    if(d.blood){
      d.mesh.userData.life-=dt; d.mesh.userData.v.y-=12*dt;
      d.mesh.position.addScaledVector(d.mesh.userData.v,dt);
      if(d.mesh.userData.life<=0||d.mesh.position.y<0){ scene.remove(d.mesh); drops.splice(i,1); }
    }
  }
}
function updateCamera(dt){
  const dist=12, horiz=dist*Math.cos(camPitch);
  const cx=player.position.x - Math.sin(camYaw)*horiz;
  const cz=player.position.z - Math.cos(camYaw)*horiz;
  const cy=player.position.y + dist*Math.sin(camPitch) + 1.5;
  camera.position.lerp(new THREE.Vector3(cx,cy,cz), 0.18);
  const lk=player.position.clone(); lk.y+=1.2;
  if(shake>0){ camera.position.x+=rnd(-shake,shake); camera.position.y+=rnd(-shake,shake); shake-=dt*2; }
  camera.lookAt(lk);
  sun.position.set(player.position.x+30, 60, player.position.z+20);
  sun.target.position.copy(player.position);
}

// ---------- HUD ----------
function bar(id,v){ document.getElementById(id).style.width=Math.max(0,Math.min(100,v))+"%"; }
function updateHUD(){
  bar("barHp",S.hp); bar("barHun",S.hunger); bar("barThi",S.thirst); bar("barTem",S.temp); bar("barSta",S.stamina);
  const di=document.getElementById("dayInfo");
  let s=S.day+"일째 "+(S.phase==="day"?"☀️ 낮":"🌙 밤");
  if(S.weather==="rain") s+=" 🌧️";
  if(S.poison>0) s+=" ☠️"+S.poison;
  if(S.heliActive) s+=" · 🚁"+Math.ceil(S.heliTimer)+"초!";
  di.textContent=s;
  drawMap();
}
const mapCv=document.getElementById("map"), mapCtx=mapCv.getContext("2d");
function drawMap(){
  const W=96, sc=W/(MAP*2);
  mapCtx.clearRect(0,0,W,W);
  const px=x=>(x+MAP)*sc, pz=z=>(z+MAP)*sc;
  mapCtx.fillStyle="#2f7fd6";
  for(const r of rivers) mapCtx.fillRect(px(r.minX),pz(r.minZ),(r.maxX-r.minX)*sc,(r.maxZ-r.minZ)*sc);
  mapCtx.fillStyle="#6fd0ff"; mapCtx.beginPath(); mapCtx.arc(px(springPos.x),pz(springPos.z),3,0,7); mapCtx.fill();
  if(S.bedPos){ mapCtx.fillStyle="#ffcf6a"; mapCtx.fillRect(px(S.bedPos.x)-2,pz(S.bedPos.z)-2,4,4); }
  if(S.heliPos){ mapCtx.fillStyle="#ff4a4a"; mapCtx.beginPath(); mapCtx.arc(px(S.heliPos.x),pz(S.heliPos.z),4,0,7); mapCtx.fill(); }
  mapCtx.fillStyle="#fff"; mapCtx.beginPath(); mapCtx.arc(px(player.position.x),pz(player.position.z),3,0,7); mapCtx.fill();
}

// ---------- 멀티플레이 (PeerJS, 최대 4명) ----------
const NET={
  active:false, isHost:false, peer:null, code:null, seed:0, name:"", selfId:"host",
  conns:[], host:null, states:{}, meshes:{}, started:false, sendAcc:0, playerN:1,
};
function mpStatus(t){ document.getElementById("mpStatus").textContent=t; }
function randCode(){ const L="ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; let s=""; for(let i=0;i<4;i++) s+=L[Math.floor(Math.random()*L.length)]; return s; }
function myName(){ const v=(document.getElementById("nameInput").value||"").trim(); return (v||("생존자"+Math.floor(Math.random()*90+10))).slice(0,8); }
function refreshPlayers(){
  const names=[NET.name+(NET.isHost?" 👑":"")];
  for(const id in NET.states){ if(NET.states[id]&&NET.states[id].name) names.push(NET.states[id].name); }
  const el=document.getElementById("mpPlayers"); if(el) el.innerHTML="👥 "+names.join(", ")+"  ("+names.length+"/4)";
}
function netHost(){
  if(typeof Peer==="undefined"){ mpStatus("통신 로딩 실패 (인터넷 확인)"); return; }
  NET.active=true; NET.isHost=true; NET.name=myName(); NET.selfId="host";
  NET.seed=Math.floor(Math.random()*1e9)+1; NET.code=randCode();
  document.getElementById("hostBtn").disabled=true; document.getElementById("joinBtn").disabled=true;
  mpStatus("방 만드는 중…");
  NET.peer=new Peer("forestsv-"+NET.code);
  NET.peer.on("open",()=>{ document.getElementById("mpStatus").innerHTML='방 코드: <span id="mpCode">'+NET.code+'</span><br>친구한테 알려줘! 다 모이면 시작 눌러!'; document.getElementById("mpStartBtn").style.display=""; refreshPlayers(); });
  NET.peer.on("error",e=>{ mpStatus("에러("+e.type+") 다시 시도"); document.getElementById("hostBtn").disabled=false; });
  NET.peer.on("connection",conn=>{
    if(NET.conns.length>=3){ conn.on("open",()=>conn.send({t:"full"})); return; }
    NET.conns.push(conn);
    conn.on("open",()=>{ conn.send({t:"welcome",seed:NET.seed}); if(NET.started) conn.send({t:"go",n:NET.playerN}); });
    conn.on("data",m=>{
      if(m.t==="hello"){ NET.states[conn.peer]=Object.assign(NET.states[conn.peer]||{},{name:m.name}); }
      else if(m.t==="state"){ NET.states[conn.peer]=Object.assign(NET.states[conn.peer]||{}, m.s); }
      refreshPlayers();
    });
    conn.on("close",()=>{ NET.conns=NET.conns.filter(c=>c!==conn); delete NET.states[conn.peer]; removeRemote(conn.peer); refreshPlayers(); });
    refreshPlayers();
  });
}
function netJoin(){
  if(typeof Peer==="undefined"){ mpStatus("통신 로딩 실패 (인터넷 확인)"); return; }
  const code=((document.getElementById("codeInput").value||"").trim().toUpperCase());
  if(code.length!==4){ mpStatus("코드 4글자를 입력해!"); return; }
  NET.active=true; NET.isHost=false; NET.name=myName();
  document.getElementById("hostBtn").disabled=true; document.getElementById("joinBtn").disabled=true;
  mpStatus("연결 중…");
  NET.peer=new Peer();
  NET.peer.on("open",()=>{
    NET.selfId=NET.peer.id;
    const conn=NET.peer.connect("forestsv-"+code, {reliable:true});
    NET.host=conn;
    conn.on("open",()=>{ conn.send({t:"hello",name:NET.name}); mpStatus("연결됐어! 방장이 시작하길 기다려…"); });
    conn.on("data",m=>{
      if(m.t==="welcome"){ NET.seed=m.seed; }
      else if(m.t==="go"){ if(!NET.started){ NET.started=true; NET.playerN=m.n||1; startGame(); } }
      else if(m.t==="snapshot"){ const ps=m.players||{}, ns={}; for(const id in ps){ if(id!==NET.selfId) ns[id]=ps[id]; } NET.states=ns; }
      else if(m.t==="full"){ mpStatus("방이 꽉 찼어 (4명)"); }
    });
    conn.on("close",()=>mpStatus("연결이 끊겼어"));
  });
  NET.peer.on("error",e=>{ mpStatus("에러("+e.type+") 코드 확인!"); document.getElementById("joinBtn").disabled=false; });
}
function mpStart(){ NET.started=true; NET.playerN=NET.conns.length+1; for(const c of NET.conns){ try{ c.send({t:"go",n:NET.playerN}); }catch(e){} } startGame(); }
function netTick(dt){
  NET.sendAcc+=dt; if(NET.sendAcc<0.06) return; NET.sendAcc=0;
  const s={x:Math.round(player.position.x*100)/100, z:Math.round(player.position.z*100)/100, yaw:Math.round(playerYaw*100)/100, walk:(Math.hypot(joy.x,joy.y)>0.15?1:0), weapon:S.weapon, hp:Math.round(S.hp), name:NET.name};
  if(NET.isHost){
    const players={}; players[NET.selfId]=s;
    for(const id in NET.states){ players[id]=NET.states[id]; }
    const snap={t:"snapshot",players};
    for(const c of NET.conns){ if(c.open){ try{ c.send(snap); }catch(e){} } }
  } else if(NET.host && NET.host.open){
    try{ NET.host.send({t:"state",s}); }catch(e){}
  }
}
function mkLabel2(txt){
  const cv=document.createElement("canvas"); cv.width=256; cv.height=64; const c=cv.getContext("2d");
  c.fillStyle="rgba(0,0,0,0.45)"; c.fillRect(0,0,256,64);
  c.font="bold 38px sans-serif"; c.textAlign="center"; c.textBaseline="middle"; c.fillStyle="#aef0b2"; c.fillText(txt,128,34);
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(cv),depthTest:false}));
  sp.scale.set(3.2,0.8,1); return sp;
}
const REMOTE_COLORS=[0xffcf6a,0x9ad0ff,0xff9ad0,0xb0ff8a];
let _remoteIdx=0;
function makeRemoteChar(name){
  const g=new THREE.Group();
  const cloth=REMOTE_COLORS[(_remoteIdx++)%REMOTE_COLORS.length];
  const body=new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.38,0.78,8), new THREE.MeshLambertMaterial({color:cloth})); body.position.y=1.15; body.castShadow=true; g.add(body);
  const head=new THREE.Mesh(new THREE.SphereGeometry(0.31,10,8), new THREE.MeshLambertMaterial({color:0xf2c89a})); head.position.y=1.88; head.castShadow=true; g.add(head);
  const hair=new THREE.Mesh(new THREE.SphereGeometry(0.34,10,8,0,Math.PI*2,0,Math.PI*0.6), new THREE.MeshLambertMaterial({color:0x3a2a1a})); hair.position.y=1.92; g.add(hair);
  const legMat=new THREE.MeshLambertMaterial({color:0x33405a});
  const legL=mkLimb(legMat,-0.16,0.78,g,{geo:new THREE.BoxGeometry(0.2,0.13,0.34),mat:new THREE.MeshLambertMaterial({color:0x222222}),fz:0.08});
  const legR=mkLimb(legMat,0.16,0.78,g,{geo:new THREE.BoxGeometry(0.2,0.13,0.34),mat:new THREE.MeshLambertMaterial({color:0x222222}),fz:0.08});
  const tag=mkLabel2(name||"?"); tag.position.y=2.55; g.add(tag);
  scene.add(g);
  return {grp:g, legL, legR, walk:0, name};
}
function removeRemote(id){ const m=NET.meshes[id]; if(m){ scene.remove(m.grp); delete NET.meshes[id]; } }
function netRenderRemotes(dt){
  for(const id in NET.states){
    const st=NET.states[id]; if(!st || st.x===undefined) continue;
    let m=NET.meshes[id]; if(!m){ m=makeRemoteChar(st.name); NET.meshes[id]=m; }
    m.grp.position.x += (st.x-m.grp.position.x)*Math.min(1,dt*10);
    m.grp.position.z += (st.z-m.grp.position.z)*Math.min(1,dt*10);
    m.grp.rotation.y = st.yaw||0;
    if(st.walk){ m.walk+=dt*12; const sw=Math.sin(m.walk)*0.5; m.legL.rotation.x=sw; m.legR.rotation.x=-sw; }
    else { m.legL.rotation.x*=0.8; m.legR.rotation.x*=0.8; }
  }
  for(const id in NET.meshes){ if(!NET.states[id]) removeRemote(id); }
}

// ---------- 시작 ----------
function startGame(){
  if(!THREE_OK){ alert("3D 로딩 실패 (인터넷 확인)"); return; }
  if(S.mode!=="title") return;
  document.getElementById("title").style.display="none";
  ["hud","topright","joy","acts","actLabel"].forEach(id=>document.getElementById(id).classList.remove("hidden"));
  SFX.resume();
  setSeed(NET.active ? NET.seed : (Math.floor(Math.random()*1e9)+1));
  S.mode="play";
  initThree();
  updateWeaponMesh();
  requestAnimationFrame(loop);
  bigMsg(NET.active ? "👥 멀티 생존 시작!" : "✈️💥 비행기 추락! 살아남아라!");
  setTimeout(()=>toast("💡 빈 화면을 손가락으로 드래그하면 카메라 360° 회전!"),2800);
}
document.getElementById("startBtn").addEventListener("click",startGame);
document.getElementById("mpBtn").addEventListener("click",()=>{ document.getElementById("mpBox").classList.remove("hidden"); document.getElementById("mpBtn").style.display="none"; SFX.resume(); });
document.getElementById("hostBtn").addEventListener("click",netHost);
document.getElementById("joinBtn").addEventListener("click",netJoin);
document.getElementById("mpStartBtn").addEventListener("click",mpStart);
</script>
